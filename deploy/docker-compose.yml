services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: featcat-llm
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    command: >
      --model /models/gemma-4-E2B-it-Q4_K_M.gguf
      --ctx-size 4096
      --port 8080
      --host 0.0.0.0
      --jinja
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  postgres:
    image: pgvector/pgvector:pg16
    container_name: featcat-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-featcat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-featcat_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-featcat}
    volumes:
      - featcat-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-featcat} -d ${POSTGRES_DB:-featcat}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  featcat:
    image: nxank4/featcat:${FEATCAT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
        - NO_PROXY=localhost,127.0.0.1
    container_name: featcat-server
    volumes:
      - featcat_data:/data
      - ${DATA_DIR:-./data}:/sources
    ports:
      - "${FEATCAT_PORT:-8000}:8000"
    environment:
      # Backend selection. Defaults to 'postgres' as of Phase 3 (scheduler /
      # routes / CLI all run portably). Operators can override to 'sqlite' for
      # local dev or testing — FEATCAT_CATALOG_DB_PATH still applies in that mode.
      - FEATCAT_DB_BACKEND=${FEATCAT_DB_BACKEND:-postgres}
      - FEATCAT_DB_URL=${FEATCAT_DB_URL:-postgresql+psycopg2://${POSTGRES_USER:-featcat}:${POSTGRES_PASSWORD:-featcat_local_only}@postgres:5432/${POSTGRES_DB:-featcat}}
      - FEATCAT_CATALOG_DB_PATH=/data/catalog.db
      - FEATCAT_LLM_BACKEND=llamacpp
      - FEATCAT_LLAMACPP_URL=http://llm:8080
      - FEATCAT_LLM_MODEL=${FEATCAT_LLM_MODEL:-gemma-4-E2B-it}
      - FEATCAT_SERVER_AUTH_TOKEN=${SERVER_AUTH:-}
      - NO_PROXY=llm,postgres,localhost,127.0.0.1
      - no_proxy=llm,postgres,localhost,127.0.0.1
    depends_on:
      llm:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # T1.5a — Celery + Redis worker stack. Activated only with the ``tasks``
  # profile (``docker compose --profile tasks up -d``) so default deploys
  # don't pull Redis/workers/Flower until the operator opts in. Until T1.5c
  # the API server still runs jobs through APScheduler in-process; this
  # stack runs alongside, not in place of, that path.

  redis:
    image: redis:7-alpine
    container_name: featcat-redis
    profiles: ["tasks"]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - featcat-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  featcat-worker:
    image: nxank4/featcat:${FEATCAT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: featcat-worker
    profiles: ["tasks"]
    command: ["sh", "-c", "uv pip install --system celery[redis]>=5.3 flower>=2.0 && celery -A featcat.tasks.app worker --loglevel=info --concurrency=2"]
    environment:
      - FEATCAT_REDIS_URL=${FEATCAT_REDIS_URL:-redis://redis:6379/0}
      - FEATCAT_DB_BACKEND=${FEATCAT_DB_BACKEND:-postgres}
      - FEATCAT_DB_URL=${FEATCAT_DB_URL:-postgresql+psycopg2://${POSTGRES_USER:-featcat}:${POSTGRES_PASSWORD:-featcat_local_only}@postgres:5432/${POSTGRES_DB:-featcat}}
      - FEATCAT_CATALOG_DB_PATH=/data/catalog.db
      - FEATCAT_LLAMACPP_URL=http://llm:8080
      - FEATCAT_LLM_MODEL=${FEATCAT_LLM_MODEL:-gemma-4-E2B-it}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  featcat-beat:
    image: nxank4/featcat:${FEATCAT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: featcat-beat
    profiles: ["tasks"]
    command: ["sh", "-c", "uv pip install --system celery[redis]>=5.3 && celery -A featcat.tasks.app beat --loglevel=info"]
    environment:
      - FEATCAT_REDIS_URL=${FEATCAT_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  featcat-flower:
    image: nxank4/featcat:${FEATCAT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: featcat-flower
    profiles: ["tasks"]
    command: ["sh", "-c", "uv pip install --system celery[redis]>=5.3 flower>=2.0 && celery -A featcat.tasks.app flower --port=5555"]
    ports:
      - "${FEATCAT_FLOWER_PORT:-5555}:5555"
    environment:
      - FEATCAT_REDIS_URL=${FEATCAT_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: featcat-minio
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-featcat}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-featcat-secret}
    volumes:
      - featcat-minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-featcat} ${MINIO_ROOT_PASSWORD:-featcat-secret}; do sleep 1; done &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-featcat-smoke}
      "

volumes:
  featcat_data:
  featcat-postgres-data:
  featcat-redis-data:
  featcat-minio-data:
