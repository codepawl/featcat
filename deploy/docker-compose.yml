services:
  ollama:
    image: ollama/ollama:latest
    container_name: featcat-ollama
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
      NO_PROXY: "localhost,127.0.0.1,featcat,featcat-server"
      no_proxy: "localhost,127.0.0.1,featcat,featcat-server"
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  featcat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: featcat-server
    volumes:
      - featcat_data:/data
      - ${DATA_DIR:-./data}:/sources
    ports:
      - "${FEATCAT_PORT:-8000}:8000"
    environment:
      - FEATCAT_CATALOG_DB_PATH=/data/catalog.db
      - FEATCAT_OLLAMA_URL=http://ollama:11434
      - FEATCAT_LLM_MODEL=${LLM_MODEL:-qwen3.5:0.8b}
      - FEATCAT_SERVER_AUTH_TOKEN=${SERVER_AUTH:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,ollama,featcat-ollama
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  featcat_data:
