services:
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: featcat-llm
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    command: >
      --model /models/gemma-4-E2B-it-Q4_K_M.gguf
      --ctx-size 4096
      --port 8080
      --host 0.0.0.0
      --jinja
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  featcat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: featcat-server
    volumes:
      - featcat_data:/data
      - ${DATA_DIR:-./data}:/sources
    ports:
      - "${FEATCAT_PORT:-8000}:8000"
    environment:
      - FEATCAT_CATALOG_DB_PATH=/data/catalog.db
      - FEATCAT_LLM_BACKEND=llamacpp
      - FEATCAT_LLAMACPP_URL=http://llm:8080
      - FEATCAT_LLM_MODEL=${LLM_MODEL:-gemma-4-E2B-it}
      - FEATCAT_SERVER_AUTH_TOKEN=${SERVER_AUTH:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,llm,featcat-llm
      - no_proxy=localhost,127.0.0.1,llm,featcat-llm
    depends_on:
      - llm
    restart: unless-stopped

volumes:
  featcat_data:
