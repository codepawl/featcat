[project]
name = "featcat"
version = "0.3.0"
description = "Lightweight AI-powered Feature Catalog for Data Science teams"
requires-python = ">=3.10"
authors = [
    {name = "Codepawl"},
]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pyarrow>=14.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
]

[project.optional-dependencies]
s3 = ["s3fs>=2023.10.0"]
tui = ["textual>=0.50.0"]
search = ["rapidfuzz>=3.0.0"]
dev = [
    "pytest>=7.0.0",
    "pytest-tmp-files>=0.0.2",
    "moto[s3]>=5.0.0",
    "boto3>=1.28.0",
]

[project.urls]
Homepage = "https://github.com/codepawl/featcat"

[project.scripts]
featcat = "featcat.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
