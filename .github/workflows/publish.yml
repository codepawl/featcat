# SETUP REQUIRED (one-time):
# 1. Go to https://pypi.org/manage/account/publishing/
#    Add trusted publisher:
#    - Owner: codepawl
#    - Repository: featcat
#    - Workflow: publish.yml
#    - Environment: pypi
#
# 2. Same for TestPyPI: https://test.pypi.org/manage/account/publishing/
#    - Environment: testpypi
#
# 3. In GitHub repo Settings > Environments:
#    - Create "pypi" environment with required reviewers (optional but recommended)
#    - Create "testpypi" environment (no protection needed)
#
# RELEASING:
# 1. Update version in featcat/__init__.py
# 2. Update CHANGELOG.md
# 3. Commit: git commit -am "release: v0.1.0"
# 4. Tag: git tag v0.1.0
# 5. Push: git push && git push --tags
# 6. Create GitHub Release from the tag
# 7. Pipeline runs automatically: test -> build -> testpypi -> verify -> pypi

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv pip install --system -e ".[dev,tui,s3]"
      - run: pytest --cov=featcat --cov-report=xml --cov-report=term-missing

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv pip install --system build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - run: sleep 30
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv pip install --system --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ featcat
      - run: featcat --help
      - name: Verify version matches tag
        run: |
          INSTALLED=$(python -c "import featcat; print(featcat.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          echo "Installed: $INSTALLED, Tag: $TAG"
          [ "$INSTALLED" = "$TAG" ]

  publish-pypi:
    needs: verify-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
