# Builds the featcat Docker image (CPU + GPU variants, linux/amd64) and pushes
# it to Docker Hub (docker.io/nxank4/featcat) on every push to main and every
# v*.*.* tag. workflow_dispatch is available for ad-hoc rebuilds.
#
# SETUP REQUIRED (one-time, before the first run):
#   Add two repo secrets in Settings → Secrets and variables → Actions:
#     - DOCKERHUB_USERNAME — Docker Hub username with push access to nxank4/featcat
#     - DOCKERHUB_TOKEN    — Docker Hub access token (Account Settings → Security)
#   Without these, the docker/login-action step will fail and nothing is pushed.
#
# Tag scheme:
#   push to main             -> :latest, :latest-gpu
#   push tag v1.2.3          -> :1.2.3, :1.2.3-gpu, and refresh :latest, :latest-gpu
#   workflow_dispatch        -> :sha-<short>, :sha-<short>-gpu (does not touch :latest)

name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            suffix: ""
          - variant: gpu
            suffix: "-gpu"
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Check Docker Hub credentials
        id: dockerhub
        shell: bash
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::warning::Skipping Docker publish because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."
            echo "configured=false" >> "${GITHUB_OUTPUT}"
          fi

      - uses: docker/setup-qemu-action@v4
        if: steps.dockerhub.outputs.configured == 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.dockerhub.outputs.configured == 'true'

      - uses: docker/login-action@v3
        if: steps.dockerhub.outputs.configured == 'true'
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        if: steps.dockerhub.outputs.configured == 'true'
        with:
          images: docker.io/nxank4/featcat
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'workflow_dispatch' }}

      # Step A: build locally (--load) so we can smoke-test before pushing.
      # Single-platform; --load requires it. Cache is keyed per variant so CPU
      # and GPU don't fight over the same layer cache.
      - name: Build (smoke-test image)
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          load: true
          tags: featcat-smoke:${{ matrix.variant }}
          build-args: |
            TORCH_VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Smoke test (import torch)
        if: steps.dockerhub.outputs.configured == 'true'
        run: |
          docker run --rm featcat-smoke:${{ matrix.variant }} \
            python -c "import torch; print(torch.__version__)"

      # Step B: real push. Reuses the buildx cache populated above, so this
      # does not actually re-execute the build steps.
      - name: Build and push
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TORCH_VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
