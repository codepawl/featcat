# Builds the featcat Docker image (multi-arch: linux/amd64 + linux/arm64) and
# pushes it to GitHub Container Registry on every published release.
#
# SETUP REQUIRED (one-time, after the first successful push):
# 1. The package appears at https://github.com/codepawl/featcat/pkgs/container/featcat
#    It is created as Private by default. To allow anonymous `docker pull`,
#    open Package settings → Change visibility → Public.
# 2. Optionally link the package to this repo (same settings page) so it
#    shows up in the repo sidebar and is deleted when the repo is deleted.
#
# No new secrets are required: GHCR auth uses the workflow's GITHUB_TOKEN.

name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/featcat
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
