name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem this would solve and the shape of the solution you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like featcat to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: checkboxes
    id: interfaces
    attributes:
      label: Affected interfaces
      options:
        - label: CLI
        - label: TUI
        - label: API
        - label: Web UI
        - label: Docs