<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>featcat - Jobs</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="logo">featcat</div>
            <a href="/" class="nav-item">Dashboard</a>
            <a href="/features" class="nav-item">Features</a>
            <a href="/monitoring" class="nav-item">Monitoring</a>
            <a href="/jobs" class="nav-item active">Jobs</a>
            <a href="/chat" class="nav-item">AI Chat</a>
            <div class="nav-footer">
                <span class="status-dot green" id="server-dot"></span> Server
                <br><span class="status-dot" id="llm-dot"></span> LLM: <span id="llm-status">checking...</span>
            </div>
        </nav>
        <div class="main">
            <div class="page-header">
                <h1>Jobs</h1>
                <span class="meta" id="last-updated">Loading...</span>
            </div>

            <!-- Job Cards -->
            <div class="card-grid" id="job-cards">
                <div class="card"><div class="skeleton skeleton-card"></div></div>
                <div class="card"><div class="skeleton skeleton-card"></div></div>
                <div class="card"><div class="skeleton skeleton-card"></div></div>
            </div>

            <!-- Execution Stats Chart -->
            <div class="card mb-3">
                <h3 style="margin-top:0">Execution Stats (Last 14 Days)</h3>
                <canvas id="stats-chart" height="260"></canvas>
            </div>

            <!-- Execution History -->
            <div class="card mb-3">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
                    <h3 style="margin:0">Execution History</h3>
                    <div style="display:flex;gap:8px">
                        <select class="select" id="filter-job" style="width:180px" onchange="applyFilters()">
                            <option value="">All Jobs</option>
                        </select>
                        <select class="select" id="filter-status" style="width:140px" onchange="applyFilters()">
                            <option value="">All Statuses</option>
                            <option value="success">Success</option>
                            <option value="failed">Failed</option>
                            <option value="warning">Warning</option>
                            <option value="running">Running</option>
                        </select>
                    </div>
                </div>
                <table class="data-table" id="logs-table">
                    <thead>
                        <tr>
                            <th>Job Name</th>
                            <th>Status</th>
                            <th>Started At</th>
                            <th>Duration</th>
                            <th>Result</th>
                            <th>Triggered By</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <tr><td colspan="6"><div class="skeleton skeleton-card"></div></td></tr>
                    </tbody>
                </table>
                <div class="pagination" id="logs-pagination"></div>
            </div>

            <div id="error-banner" class="hidden" style="text-align:center;padding:40px">
                <p style="color:var(--danger);font-size:1.1rem">Cannot connect to server</p>
                <button class="btn btn-primary" onclick="loadJobs()">Retry</button>
            </div>
        </div>
    </div>

    <!-- Schedule Editor Modal -->
    <div class="modal-overlay" id="schedule-modal">
        <div class="modal">
            <h2>Edit Schedule</h2>
            <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:-8px" id="modal-job-name"></p>
            <div class="form-group">
                <label>Cron Expression</label>
                <input class="input" type="text" id="cron-input" placeholder="0 * * * *" oninput="updateCronPreview()">
                <div style="margin-top:6px;font-size:0.85rem;color:var(--text-secondary)" id="cron-preview"></div>
            </div>
            <div class="form-group">
                <label>Presets</label>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="btn btn-sm btn-secondary" onclick="setCronPreset('0 * * * *')">Every hour</button>
                    <button class="btn btn-sm btn-secondary" onclick="setCronPreset('0 */6 * * *')">Every 6 hours</button>
                    <button class="btn btn-sm btn-secondary" onclick="setCronPreset('0 2 * * *')">Daily</button>
                    <button class="btn btn-sm btn-secondary" onclick="setCronPreset('0 3 * * 0')">Weekly</button>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="closeScheduleModal()">Cancel</button>
                <button class="btn btn-primary" id="btn-save-schedule" onclick="saveSchedule()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="js/jobs.js"></script>
</body>
</html>
