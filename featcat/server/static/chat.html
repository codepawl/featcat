<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>featcat - AI Chat</title>
    <link rel="stylesheet" href="css/app.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="logo">featcat</div>
            <a href="/" class="nav-item">Dashboard</a>
            <a href="/features" class="nav-item">Features</a>
            <a href="/monitoring" class="nav-item">Monitoring</a>
            <a href="/jobs" class="nav-item">Jobs</a>
            <a href="/chat" class="nav-item active">AI Chat</a>
            <div class="nav-footer">
                <div><span class="status-dot green" id="server-dot"></span> Server</div>
                <div><span class="status-dot" id="llm-dot"></span> LLM: <span id="llm-status">checking...</span></div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12a4 4 0 100-8 4 4 0 000 8zm0-9.5a.75.75 0 01.75.75v.5a.75.75 0 01-1.5 0v-.5A.75.75 0 018 2.5zm0 11a.75.75 0 01.75.75v.5a.75.75 0 01-1.5 0v-.5A.75.75 0 018 13.5zM2.5 8a.75.75 0 01.75-.75h.5a.75.75 0 010 1.5h-.5A.75.75 0 012.5 8zm11 0a.75.75 0 01.75-.75h.5a.75.75 0 010 1.5h-.5A.75.75 0 0113.5 8z"/></svg>
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M9.598 1.591a.75.75 0 01.785.175 7 7 0 01-12.075 5.535.75.75 0 01.67-1.244 5.5 5.5 0 009.5-4.354.75.75 0 01.12-.112z"/></svg>
                </button>
            </div>
        </nav>
        <div class="main" style="padding:0;display:flex;flex-direction:column">
            <div class="chat-container">
                <div class="chat-messages" id="messages"></div>
                <div class="chat-input-area">
                    <div class="chat-shortcuts">
                        <button class="btn btn-sm btn-secondary" onclick="prefill('discover: ')">Discover Features</button>
                        <button class="btn btn-sm btn-secondary" onclick="prefill('which features have drifted?')">Check Drift</button>
                        <button class="btn btn-sm btn-secondary" onclick="prefill('show me catalog statistics')">Catalog Stats</button>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" class="input" id="chat-input" placeholder="Ask about features..." autocomplete="off">
                        <button class="btn btn-primary" id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
